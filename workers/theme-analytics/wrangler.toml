# Theme analytics: page views, downloads, star ratings (D1).
# Local: cd workers/theme-analytics && npx wrangler deploy
# First-time D1:
#   npx wrangler d1 create y1-theme-metrics
#   (paste database_id below)
#   npx wrangler d1 execute y1-theme-metrics --remote --file=./schema.sql

name = "y1-theme-analytics"
main = "src/index.js"
compatibility_date = "2026-05-11"

# REQUIRED: Replace database_id with your real UUID from
# Cloudflare Dashboard → Storage & Databases → D1 → y1-theme-metrics → Database ID.
# Deploy fails with code 10181 while this is still 00000000-0000-0000-0000-000000000000.
[[d1_databases]]
binding = "DB"
database_name = "y1-theme-metrics"
database_id = "c2bffa31-ebe4-473e-b1f9-f0e829e7eb6b"
