name: Process Theme Zip Submissions

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-zips:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Process zip submissions into theme folders
        run: python themes/scripts/process_theme_zips.py

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push extracted themes
        run: |
          set -e
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No zip extraction changes to commit."
            exit 0
          fi
          git add -A
          git commit -m "Auto-extract submitted theme zip files"
          git push origin HEAD:${GITHUB_REF_NAME}
