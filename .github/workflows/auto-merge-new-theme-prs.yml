# Merges only when scripts/validate_theme_pr.py exits 0. That script blocks auto-merge when:
# - The PR is not strictly additive, or zips/files fail safety checks.
# - A theme folder path already exists on the default branch, or another root ZIP still
#   claims the same logical folder name (avoids races before extraction).
# - themes.json identity matches (logical folder slug by case-insensitive path;
#   same author or both unknown => treated as edit). Different authors must use a
#   suffixed folder name (e.g. ThemeName-handle) inside the ZIP.
# - Catalog title (theme_info.title) matches an existing entry (normalized).
# - Gallery upload PRs may add a paired *.zip.meta.json next to the same PR's root *.zip
#   (upload handler sidecar); multi-theme zips are validated per config.json root.
#
# Removal PRs (title starts with [Removal]) never run this job: the workflow is skipped so
# removal requests are always reviewed and merged manually — no automatic submission.

name: Auto Merge New Theme PRs

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-and-merge:
    if: ${{ github.event.pull_request.draft == false && !startsWith(github.event.pull_request.title, '[Removal]') && !startsWith(github.event.pull_request.title, '[Metadata]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch PR head ref
        run: |
          git fetch origin "pull/${{ github.event.pull_request.number }}/head:pr-head"

      - name: Validate PR policy for auto-merge
        run: |
          python scripts/validate_theme_pr.py "${{ github.event.pull_request.base.sha }}" "pr-head"

      - name: Auto-merge validated PR
        if: ${{ !startsWith(github.event.pull_request.title, '[Removal]') }}
        uses: actions/github-script@v7
        with:
          script: |
            const pull_number = context.payload.pull_request.number;
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
              merge_method: "squash"
            });
      - name: Comment with share URL(s)
        if: ${{ !startsWith(github.event.pull_request.title, '[Removal]') }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            );

            const folders = new Set();
            for (const file of files) {
              if (!file || file.status !== "added") continue;
              const name = String(file.filename || "").trim();
              if (!name) continue;
              if (/^[^/]+\/config\.json$/i.test(name)) {
                folders.add(name.replace(/\/config\.json$/i, ""));
                continue;
              }
              if (/^[^/]+\.zip$/i.test(name)) {
                const stem = name.replace(/\.zip$/i, "").trim();
                if (stem) folders.add(stem);
              }
            }

            const urls = [...folders].map((folder) => {
              const encoded = folder.split("/").filter(Boolean).map(encodeURIComponent).join("/");
              return `https://themes.innioasis.app/${encoded}`;
            });

            const shareLines = urls.length
              ? urls.map((u) => `- ${u}`).join("\n")
              : "- https://themes.innioasis.app/";
            const body = [
              "Theme auto-submission succeeded and this PR was auto-merged.",
              "",
              "You can now share the theme URL:",
              shareLines,
              "",
              "If the page is not live yet, wait a minute for the ingest/sync workflow to finish."
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body
            });
