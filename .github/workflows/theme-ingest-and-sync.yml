name: Theme ingest and sync

# Chains: extract root upload zips → sync themes.json + per-theme index.html → orphan meta cleanup.
# Zips are validated on merge by scripts/validate_theme_pr.py (multi-theme archives, paired *.zip.meta.json).
# Replaces separate extract/process zip workflows to avoid races and long delays before metadata sync.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_run:
    workflows:
      - Auto Merge New Theme PRs
    types:
      - completed
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: theme-publish-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ingest-and-sync:
    if: ${{ (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') && (github.event_name != 'pull_request' || github.event.pull_request.merged == true) }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ingest dependencies
        run: python -m pip install --upgrade pip pillow

      - name: Extract root theme zip submissions (identity-aware overwrite)
        run: python scripts/process_theme_zips.py
        env:
          PROCESS_THEME_ZIPS_STRICT: "true"

      - name: Optimize theme assets
        run: python scripts/optimize_theme_assets.py
        env:
          THEME_ASSET_MAX_DIMENSION: "320"

      - name: Sync themes.json and theme index pages
        run: python scripts/sync_theme_metadata.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup stale upload zip/meta artifacts
        run: python scripts/cleanup_upload_artifacts.py

      - name: Verify theme index pages exist
        run: python scripts/sync_theme_metadata.py --check-theme-indexes

      - name: Generate sitemap.xml
        run: python scripts/generate_sitemap.py

      - name: Commit and push
        run: |
          set -e
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No theme ingest or metadata changes."
            exit 0
          fi
          TARGET_BRANCH="${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}"
          if [[ -z "${TARGET_BRANCH}" ]]; then
            TARGET_BRANCH="main"
          fi
          git add -A
          git commit -m "Theme ingest: extract zips, sync metadata, cleanup upload artifacts"
          git pull --rebase origin "${TARGET_BRANCH}"
          git push origin HEAD:${TARGET_BRANCH}
