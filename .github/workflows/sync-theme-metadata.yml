name: Sync Theme Metadata

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync themes.json and config theme_info
        run: python scripts/sync_theme_metadata.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push metadata updates
        run: |
          set -e
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No metadata changes to commit."
            exit 0
          fi
          git add -A
          git commit -m "Auto-sync theme metadata from folders"
          git push origin HEAD:${GITHUB_REF_NAME}

