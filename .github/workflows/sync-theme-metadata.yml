name: Sync Theme Metadata

on:
  workflow_dispatch:

concurrency:
  # Single queue with theme-ingest-and-sync.yml + generate-sitemap.yml — avoids concurrent pushes to main.
  group: theme-publish-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync themes.json and config theme_info
        run: python scripts/sync_theme_metadata.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup stale upload zip/meta artifacts
        run: python scripts/cleanup_upload_artifacts.py

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push metadata updates
        run: |
          set -e
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No metadata changes to commit."
            exit 0
          fi
          git add -A
          git commit -m "Auto-sync theme metadata from folders"
          BRANCH="${GITHUB_REF_NAME:-main}"
          ok=0
          for attempt in 1 2 3 4 5 6; do
            if git pull --rebase origin "${BRANCH}" && git push origin "HEAD:${BRANCH}"; then
              ok=1
              break
            fi
            echo "Rebase/push attempt ${attempt} failed; backing off before retry..."
            sleep $(( attempt * 10 ))
          done
          if [[ "$ok" != "1" ]]; then
            echo "ERROR: could not push metadata sync after retries."
            exit 1
          fi

