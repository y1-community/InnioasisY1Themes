name: Theme PR Sanity

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  sanity:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync metadata model from repo state
        run: python scripts/sync_theme_metadata.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify theme index pages exist
        run: python scripts/sync_theme_metadata.py --check-theme-indexes

      - name: Ensure generated metadata is committed
        run: |
          set -e
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Generated metadata/index updates are missing from this PR:"
            git status --short
            echo
            echo "Run scripts/sync_theme_metadata.py locally and commit the resulting changes."
            exit 1
          fi
