name: Generate Sitemap

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "themes.json"
      - "scripts/generate_sitemap.py"

# Same queue as theme ingest / manual metadata sync so two bots never push to main at once (rebase races).
concurrency:
  group: theme-publish-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate sitemap.xml
        run: python scripts/generate_sitemap.py

      - name: Commit and push sitemap updates
        run: |
          set -e
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No sitemap changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "Update sitemap.xml"
          BRANCH="${GITHUB_REF_NAME:-main}"
          ok=0
          for attempt in 1 2 3 4 5 6; do
            if git pull --rebase origin "${BRANCH}" && git push origin "HEAD:${BRANCH}"; then
              ok=1
              break
            fi
            echo "Rebase/push attempt ${attempt} failed; backing off before retry..."
            sleep $(( attempt * 10 ))
          done
          if [[ "$ok" != "1" ]]; then
            echo "ERROR: could not push sitemap after retries."
            exit 1
          fi
