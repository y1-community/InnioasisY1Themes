# =============================================================================
# Repository root — used by Cloudflare Git when Deploy command is:
#   npx wrangler deploy
# That deploys the **y1-theme-upload** Worker (upload + removal API).
#
# Cloudflare **Pages** (if you use it for themes.innioasis.app):
#   Build command: exit 0
#   Deploy command: leave EMPTY (never npx wrangler deploy)
#   pages_build_output_dir below is for Pages only; Git publish ignores Worker main.
#
# Prefer explicit config (avoids Pages warning):
#   npx wrangler deploy --config cloudflare-worker-upload.toml
# =============================================================================

name = "y1-theme-upload"
main = "workers/theme-upload/src/index.js"
compatibility_date = "2026-05-11"

[limits]
subrequests = 150

# Cloudflare Pages static output (repo root). No effect on Worker deploy.
pages_build_output_dir = "."
