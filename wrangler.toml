# y1-theme-upload — Cloudflare Worker (Git deploy)
# Entry at repo root so `npx wrangler deploy` finds main regardless of monorepo layout.
# Pages site: wrangler.pages.toml + empty Deploy command on the Pages project.

name = "y1-theme-upload"
main = "upload-worker.js"
compatibility_date = "2026-05-11"

[limits]
subrequests = 150
