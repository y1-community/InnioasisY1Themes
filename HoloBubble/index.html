    <script>
        // Keep the hardcoded title as fallback, but prefer local theme config title when available.
        (function autoTitleFromLocalConfig() {
            fetch('config.json', {
                    cache: 'no-cache'
                })
                .then(r => r.ok ? r.json() : null)
                .then(cfg => {
                    if (!cfg) return;
                    const info = cfg.theme_info || cfg.source_info;
                    const title = info && info.title ? String(info.title).trim() : '';
                    if (title) {
                        document.title = `${title} - Innioasis Y1`;
                    }
                })
                .catch(() => {
                    // Fallback is the hardcoded <title> above.
                });
        })();
    </script>

    <script>
        function executeInlineScripts(container) {
            if (!container) return;
            const scripts = container.querySelectorAll('script');
            for (const oldScript of scripts) {
                const newScript = document.createElement('script');
                for (const attr of oldScript.attributes) {
                    newScript.setAttribute(attr.name, attr.value);
                }
                newScript.textContent = oldScript.textContent;
                oldScript.parentNode.replaceChild(newScript, oldScript);
            }
        }

        async function loadSupportToolbar() {
            const slot = document.getElementById('support-toolbar-slot');
            if (!slot) return;
            const candidates = [
                'support_toolbar.html',
                '../support_toolbar.html',
                'https://themes.innioasis.app/support_toolbar.html'
            ];
            for (const url of candidates) {
                try {
                    const res = await fetch(url, {
                        cache: 'no-cache'
                    });
                    if (!res.ok) continue;
                    slot.innerHTML = await res.text();
                    executeInlineScripts(slot);
                    return;
                } catch (e) {}
            }
        }

        loadSupportToolbar();

        const FALLBACK_PLACEHOLDER_URL = 'https://themes.innioasis.app/placeholder.png';
        const globalThemeSearch = document.getElementById('global-theme-search');
        if (globalThemeSearch) {
            globalThemeSearch.addEventListener('keydown', (e) => {
                if (e.key !== 'Enter') return;
                e.preventDefault();
                const q = String(globalThemeSearch.value || '').trim();
                const url = q ? `https://themes.innioasis.app/index.html?q=${encodeURIComponent(q)}` : 'https://themes.innioasis.app/index.html';
                location.href = url;
            });
        }

        const THEME_NAME_PLACEHOLDER = "Sabrina´s World";
        const THEME_REDIRECT_URL = "https://themes.innioasis.app";
        function resolveScreenshotPath(path) {
            if (!path) return ''
            if (path === 'placeholder.png') return FALLBACK_PLACEHOLDER_URL
            if (path.startsWith('http')) return path
            if (path.startsWith('./')) return 'https://raw.githubusercontent.com/y1-community/InnioasisY1Themes/main/' + path.slice(2)
            return path
        }

        function safeText(v) {
            return v == null ? '' : String(v)
        }

        function getRedditProfileUrl(authorValue) {
            const raw = String(authorValue || '').trim();
            if (!raw) return '';
            if (/^https?:\/\/(www\.)?reddit\.com\//i.test(raw)) return raw;
            const cleaned = raw.replace(/^\/+|\/+$/g, '');
            if (/^u\//i.test(cleaned) || /^user\//i.test(cleaned)) {
                return `https://reddit.com/${cleaned}`;
            }
            return `https://reddit.com/user/${cleaned}`;
        }

        function getPreferredAuthorUrl(author, authorUrl) {
            const explicit = String(authorUrl || '').trim();
            if (/^https?:\/\//i.test(explicit)) return explicit;
            return getRedditProfileUrl(author);
        }

        function setMetaContent(selector, value) {
            if (!value) return;
            const el = document.querySelector(selector);
            if (el) el.setAttribute('content', value);
        }

        function buildSeoTitle(name, author) {
            const cleanName = String(name || '').trim() || 'Theme';
            const cleanAuthor = String(author || '').trim();
            return cleanAuthor ? `${cleanName} Innioasis Y1 theme by ${cleanAuthor}` : `${cleanName} Innioasis Y1 theme`;
        }

        function applySeoMetadata(name, author, description) {
            const seoTitle = buildSeoTitle(name, author);
            const seoDescription = String(description || '').trim() ||
                `${String(name || 'Theme').trim()} theme for Innioasis Y1.`;
            document.title = seoTitle;
            setMetaContent('meta[property=\"og:title\"]', seoTitle);
            setMetaContent('meta[name=\"twitter:title\"]', seoTitle);
            setMetaContent('meta[name=\"description\"]', seoDescription);
            setMetaContent('meta[property=\"og:description\"]', seoDescription);
            setMetaContent('meta[name=\"twitter:description\"]', seoDescription);
        }

        function normalizeThemeKey(value) {
            return String(value || '')
                .trim()
                .toLowerCase()
                .replace(/\+/g, ' ')
                .replace(/\s+/g, ' ')
                .replace(/[^\w\s-]/g, '');
        }

        async function tryFetchThemes() {
            const urls = [
                'https://raw.githubusercontent.com/y1-community/InnioasisY1Themes/main/themes.json',
                'https://themes.innioasis.app/themes.json'
            ]
            for (const u of urls) {
                try {
                    const r = await fetch(u)
                    const j = await r.json()
                    if (r.ok && j.themes) return j.themes
                } catch (e) {}
            }
            return []
        }

        function getFolderFromCurrentPath() {
            const parts = location.pathname
                .split('/')
                .filter(Boolean)
                .map(p => {
                    try {
                        return decodeURIComponent(p);
                    } catch (e) {
                        return p;
                    }
                });
            if (!parts.length) return '';
            const last = parts[parts.length - 1].toLowerCase();
            if (last === 'theme.html' || last === 'index.html') {
                const folder = parts.slice(0, -1).join('/');
                return folder || '';
            }
            return parts.join('/');
        }

        function normalizeThemeMeta(folder, cfg, cachedTheme) {
            const cleanFolder = String(folder || '').replace(/^\.\/+/, '');
            const prefixedCover = cfg && cfg.themeCover ?
                (cleanFolder ? `./${cleanFolder}/${cfg.themeCover}` : `./${cfg.themeCover}`) :
                '';
            const info = (cfg && (cfg.source_info || cfg.theme_info)) || null;
            return {
                name: (info && info.title) || cfg.title || (cachedTheme && cachedTheme.name) || folder || 'Theme',
                description: (info && info.description) || cfg.description || (cachedTheme && cachedTheme.description) || '',
                author: (info && info.author) || cfg.author || (cachedTheme && cachedTheme.author) || null,
                authorUrl: (info && info.authorUrl) || cfg.authorUrl || (cachedTheme && cachedTheme.authorUrl) || '',
                externalDownloadUrl: (info && info.externalDownloadUrl) || cfg.externalDownloadUrl || (cachedTheme && cachedTheme.externalDownloadUrl) || '',
                authorCTA: (info && info.authorCTA) || (cachedTheme && cachedTheme.authorCTA) || '',
                screenshot: prefixedCover || ((cachedTheme && cachedTheme.screenshot) || ''),
                folder,
                rawConfig: cfg || null
            };
        }

        async function tryFetchLocalConfigTheme(cachedThemes) {
            try {
                const res = await fetch('config.json', {
                    cache: 'no-cache'
                });
                if (!res.ok) return null;
                const cfg = await res.json();
                const folder = getFolderFromCurrentPath();
                const cachedTheme = (cachedThemes || []).find(t => t && String(t.folder || '').toLowerCase() === String(folder || '').toLowerCase()) || null;
                return normalizeThemeMeta(folder, cfg, cachedTheme);
            } catch (e) {
                return null;
            }
        }

        async function tryFetchFolderConfigTheme(folder, cachedThemes) {
            const cleanFolder = String(folder || '').replace(/^\.\/+/, '');
            if (!cleanFolder) return null;
            const encodedFolder = cleanFolder.split('/').map(seg => encodeURIComponent(seg)).join('/');
            try {
                const res = await fetch(`${encodedFolder}/config.json`, {
                    cache: 'no-cache'
                });
                if (!res.ok) return null;
                const cfg = await res.json();
                const cachedTheme = (cachedThemes || []).find(t =>
                    t && String(t.folder || '').toLowerCase() === cleanFolder.toLowerCase()
                ) || null;
                return normalizeThemeMeta(cleanFolder, cfg, cachedTheme);
            } catch (e) {
                return null;
            }
        }

        function showFallbackAndRedirect() {
            const themeRoot = document.getElementById('theme-root');
            const fallbackRoot = document.getElementById('fallback-root');
            if (themeRoot) themeRoot.style.display = 'none';
            if (fallbackRoot) fallbackRoot.style.display = 'block';

            const copy = document.getElementById('fallback-copy');
            const note = document.getElementById('fallback-redirect-note');
            if (copy) {
                copy.textContent = 'Browse and download custom themes to personalize your Innioasis Y1 MP3 player, with community-made styles and easy install options.';
            }
            let remaining = 6;
            if (note) {
                note.innerHTML = `No specific theme is selected here, so you will be redirected to the full themes library in ${remaining} seconds: <a href="${THEME_REDIRECT_URL}" style="color:lightblue;">${THEME_REDIRECT_URL}</a>`;
            }
            const timer = setInterval(() => {
                remaining -= 1;
                if (note && remaining > 0) {
                    note.innerHTML = `No specific theme is selected here, so you will be redirected to the full themes library in ${remaining} seconds: <a href="${THEME_REDIRECT_URL}" style="color:lightblue;">${THEME_REDIRECT_URL}</a>`;
                }
                if (remaining <= 0) {
                    clearInterval(timer);
                    location.href = THEME_REDIRECT_URL;
                }
            }, 1000);
        }

        function encodePathSegments(pathValue) {
            return String(pathValue || '')
                .split('/')
                .filter(Boolean)
                .map(seg => encodeURIComponent(seg))
                .join('/');
        }

        function themeFileUrl(folderPath, relativePath) {
            const folderClean = String(folderPath || '').replace(/^\.\/+/, '').replace(/\/+$/, '');
            const pathClean = normalizeConfigAssetPath(relativePath, folderClean);
            if (!pathClean) return '';
            const encodedPath = encodePathSegments(pathClean);
            if (!folderClean) return `/${encodedPath}`;
            const encodedFolder = encodePathSegments(folderClean);
            return `/${encodedFolder}/${encodedPath}`;
        }

        function normalizeConfigAssetPath(rawPath, folderPath) {
            let p = String(rawPath || '').trim().replace(/\\/g, '/');
            p = p.replace(/^\.\/+/, '').replace(/^\/+/, '');
            if (!p) return '';
            const folder = String(folderPath || '').trim().replace(/\\/g, '/').replace(/^\.\/+/, '').replace(/\/+$/, '');
            if (!folder) return p;
            const lowP = p.toLowerCase();
            const lowFolder = folder.toLowerCase();
            if (lowP === lowFolder) return '';
            if (lowP.startsWith(lowFolder + '/')) {
                return p.slice(folder.length + 1);
            }
            return p;
        }

        function titleCaseWords(value) {
            return String(value || '')
                .split(/[\s_-]+/)
                .filter(Boolean)
                .map(part => part.charAt(0).toUpperCase() + part.slice(1).toLowerCase())
                .join(' ');
        }

        function maskVariantChoicesFromFiles(folderPath, fileEntries, baseMaskPath) {
            const basePath = normalizeConfigAssetPath(baseMaskPath || 'mask.png', folderPath) || 'mask.png';
            const baseLower = basePath.toLowerCase();
            const variants = [];
            const seen = new Set();
            for (const f of Array.isArray(fileEntries) ? fileEntries : []) {
                const relPath = normalizeConfigAssetPath(f && f.path, folderPath);
                if (!relPath) continue;
                const baseName = relPath.split('/').pop() || '';
                const m = baseName.match(/^mask_([a-z0-9][a-z0-9_-]*)\.png$/i);
                if (!m) continue;
                const suffix = String(m[1] || '').trim();
                if (!suffix) continue;
                const key = suffix.toLowerCase();
                if (seen.has(key)) continue;
                seen.add(key);
                variants.push({
                    value: key,
                    label: titleCaseWords(suffix),
                    sourcePath: relPath
                });
            }
            variants.sort((a, b) => a.label.localeCompare(b.label, undefined, { sensitivity: 'base' }));
            return {
                baseMaskPath: basePath,
                options: [{ value: '', label: 'Original theme', sourcePath: basePath }, ...variants]
            };
        }

        async function fetchMaskVariantPathsFromGitHub(folderPath) {
            const folderClean = String(folderPath || '').replace(/^\.\/+/, '').replace(/\/+$/, '');
            if (!folderClean) return [];
            const encoded = folderClean.split('/').filter(Boolean).map(seg => encodeURIComponent(seg)).join('/');
            const url = `https://api.github.com/repos/y1-community/InnioasisY1Themes/contents/${encoded}`;
            try {
                const res = await fetch(url, { cache: 'no-cache' });
                if (!res.ok) return [];
                const entries = await res.json();
                if (!Array.isArray(entries)) return [];
                return entries
                    .filter(item => item && item.type === 'file' && /^mask_[a-z0-9][a-z0-9_-]*\.png$/i.test(String(item.name || '')))
                    .map(item => String(item.name || '').trim())
                    .filter(Boolean);
            } catch (_) {
                return [];
            }
        }

        async function fetchVariantAssetPathsFromGitHub(folderPath) {
            const folderClean = String(folderPath || '').replace(/^\.\/+/, '').replace(/\/+$/, '');
            if (!folderClean) return [];
            const encoded = folderClean.split('/').filter(Boolean).map(seg => encodeURIComponent(seg)).join('/');
            const url = `https://api.github.com/repos/y1-community/InnioasisY1Themes/contents/${encoded}`;
            try {
                const res = await fetch(url, { cache: 'no-cache' });
                if (!res.ok) return [];
                const entries = await res.json();
                if (!Array.isArray(entries)) return [];
                return entries
                    .filter(item => item && item.type === 'file')
                    .map(item => String(item.name || '').trim())
                    .filter(name =>
                        /^mask_[a-z0-9][a-z0-9_-]*\.(png|webp)$/i.test(name) ||
                        /^(background|wallpaper|desk_bg)[a-z0-9_.-]*\.(png|jpe?g|webp)$/i.test(name)
                    );
            } catch (_) {
                return [];
            }
        }

        function applyMaskVariantToEntries(folderPath, fileEntries, variantSourcePath, baseMaskPath) {
            const src = normalizeConfigAssetPath(variantSourcePath, folderPath);
            const base = normalizeConfigAssetPath(baseMaskPath || 'mask.png', folderPath) || 'mask.png';
            if (!src || !base || src.toLowerCase() === base.toLowerCase()) {
                return Array.isArray(fileEntries) ? [...fileEntries] : [];
            }
            const out = [];
            let hasBase = false;
            for (const entry of Array.isArray(fileEntries) ? fileEntries : []) {
                const relPath = normalizeConfigAssetPath(entry && entry.path, folderPath);
                if (!relPath) continue;
                const relLow = relPath.toLowerCase();
                if (relLow === src.toLowerCase()) continue;
                if (relLow === base.toLowerCase()) {
                    hasBase = true;
                    out.push({
                        ...entry,
                        path: base,
                        download_url: themeFileUrl(folderPath, src)
                    });
                    continue;
                }
                out.push(entry);
            }
            if (!hasBase) {
                out.push({
                    name: base.split('/').pop() || 'mask.png',
                    path: base,
                    size: 0,
                    download_url: themeFileUrl(folderPath, src)
                });
            }
            return out;
        }

        function isDarkModeFolderPath(folderPath) {
            return /_dark-mode$/i.test(String(folderPath || '').replace(/^\.\/+/, '').trim());

        function ensureDarkModeDisplayName(themeName, folderPath) {
            const cleanName = String(themeName || '').trim();
            if (!isDarkModeFolderPath(folderPath)) return cleanName;
            if (/\(dark\)\s*$/i.test(cleanName)) return cleanName;
            return cleanName ? `${cleanName} (Dark)` : 'Theme (Dark)';

            {
                feature: 'eBook reader (3.0.7+)',

            {

        function getConfigValueByPath(rootObj, pathParts) {
            let cursor = rootObj;
            for (const key of pathParts) {
                if (!cursor || typeof cursor !== 'object') return '';
                cursor = cursor[key];
            }
            return typeof cursor === 'string' ? String(cursor).trim() : '';
        }

        function isIntentionalTransparentPath(pathValue) {
            const name = String(pathValue || '').split('/').pop() || '';
            return /transparent/i.test(name);
        }

        async function isPngFullyTransparentBlob(blob) {
            try {
                if (!(blob instanceof Blob)) return false;
                if (!/^image\/png$/i.test(String(blob.type || ''))) return false;
                const bitmap = await createImageBitmap(blob);
                const canvas = document.createElement('canvas');
                canvas.width = bitmap.width;
                canvas.height = bitmap.height;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                if (!ctx) {
                    bitmap.close();
                    return false;
                }
                ctx.drawImage(bitmap, 0, 0);
                bitmap.close();
                const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                for (let i = 3; i < data.length; i += 4) {
                    if (data[i] !== 0) return false;
                }
                return true;
            } catch (_) {
                return false;
            }
        }

        async function checkArtworkAssetHealth(folderPath, configuredPath) {
            const normalized = normalizeConfigAssetPath(configuredPath, folderPath);
            if (!normalized) return { ok: false, issue: 'invalid path' };
            const url = themeFileUrl(folderPath, normalized);
            if (!url) return { ok: false, issue: 'invalid path' };
            const allowTransparent = isIntentionalTransparentPath(normalized);
            let response;
            try {
                response = await fetch(url, { cache: 'no-cache' });
            } catch (_) {
                return { ok: false, issue: 'could not fetch asset' };
            }
            if (!response.ok) return { ok: false, issue: 'file not found' };
            let blob;
            try {
                blob = await response.blob();
            } catch (_) {
                return { ok: false, issue: 'failed to read asset' };
            }
            if (blob.size === 0 && !allowTransparent) {
                return { ok: false, issue: '0-byte file' };
            }
            if (/\.png$/i.test(normalized) && !allowTransparent) {
                const fullyTransparent = await isPngFullyTransparentBlob(blob);
                if (fullyTransparent) {
                    return { ok: false, issue: 'fully transparent PNG' };
                }
            }
            return { ok: true, issue: '' };
        }

        async function artworkCompatibilityWarnings(configObj, folderPath) {
            if (!configObj || typeof configObj !== 'object') return [];
            const warnings = [];
            for (const requirement of REQUIRED_ARTWORK_FEATURES) {
                const configured = getConfigValueByPath(configObj, requirement.configPath);
                if (!configured) {
                    warnings.push(`${requirement.feature}: missing \`${requirement.configPath.join('.')}\` in config.json.`);
                    continue;
                }
                const health = await checkArtworkAssetHealth(folderPath, configured);
                if (!health.ok) {
                    warnings.push(
                        `${requirement.feature}: \`${configured}\` is not ready (${health.issue}; expected ${requirement.expectedFileHint}).`
                    );
                }
            }
            return warnings;
        }

        function extractFilesFromConfig(cfg, folderPath) {
            if (!cfg || typeof cfg !== 'object') return [];
            const out = [];
            const seen = new Set();
            const hasFileExt = (v) => /\.(png|jpe?g|gif|webp|bmp|svg|ttf|otf|woff2?|json|txt|md|ini)$/i.test(String(v || ''));
            const pushFile = (value) => {
                const v = normalizeConfigAssetPath(value, folderPath);
                if (!v || v.includes('://') || !hasFileExt(v)) return;
                const key = v.toLowerCase().replace(/^\.\/+/, '');
                if (seen.has(key)) return;
                seen.add(key);
                const cleanPath = v.replace(/^\.\/+/, '');
                out.push({
                    name: cleanPath.split('/').pop(),
                    path: cleanPath,
                    size: 0,
                    download_url: themeFileUrl(folderPath, cleanPath)
                });
            };
            const walk = (node) => {
                if (Array.isArray(node)) {
                    node.forEach(walk);
                    return;
                }
                if (!node || typeof node !== 'object') {
                    if (typeof node === 'string') pushFile(node);
                    return;
                }
                for (const val of Object.values(node)) walk(val);
            };
            // Always include the config itself for complete portable exports.
            pushFile('config.json');
            walk(cfg);
            return out.filter(f => f.download_url);
        }

        function buildScreenshotCandidates(metadataScreenshot, files) {
            const hasImageExt = (name) => /\.(png|jpe?g|gif|webp)$/i.test(String(name || ''));
            const list = Array.isArray(files) ? files : [];
            const out = [];
            const seen = new Set();
            const pushCandidate = (value) => {
                const v = String(value || '').trim();
                if (!v || seen.has(v)) return;
                seen.add(v);
                out.push(v);
            };

            if (!list.length) {
                if (metadataScreenshot && hasImageExt(metadataScreenshot)) {
                    pushCandidate(resolveScreenshotPath(metadataScreenshot));
                }
                pushCandidate('placeholder.png');
                return out;
            }

            const byPattern = (regex) => list.find(f => regex.test(String(f.name || '')));

            // Handle broader screenshot-like names, e.g. screenshot2.png, homescreenshot.jpg, my_creenshot.webp
            const strongScreenshot = byPattern(/^screenshot[^/]*\.(png|jpe?g|gif|webp)$/i);
            if (strongScreenshot) pushCandidate(strongScreenshot.download_url);

            const anyReenShot = byPattern(/creenshot[^/]*\.(png|jpe?g|gif|webp)$/i);
            if (anyReenShot) pushCandidate(anyReenShot.download_url);

            const metaLooksLikeScreenshot = /creenshot[^/]*\.(png|jpe?g|gif|webp)$/i.test(String(metadataScreenshot || ''));
            if (metaLooksLikeScreenshot && metadataScreenshot && hasImageExt(metadataScreenshot)) {
                pushCandidate(resolveScreenshotPath(metadataScreenshot));
            }

            const strongCover = byPattern(/^cover[^/]*\.(png|jpe?g|gif|webp)$/i);
            if (strongCover) pushCandidate(strongCover.download_url);

            const anyCover = byPattern(/cover[^/]*\.(png|jpe?g|gif|webp)$/i);
            if (anyCover) pushCandidate(anyCover.download_url);

            // Only use metadata image after screenshots/covers from folder are considered.
            if (metadataScreenshot && hasImageExt(metadataScreenshot)) {
                pushCandidate(resolveScreenshotPath(metadataScreenshot));
            }

            const previewLike = byPattern(/(preview|thumb)[^/]*\.(png|jpe?g|gif|webp)$/i);
            if (previewLike) pushCandidate(previewLike.download_url);

            const numbered = byPattern(/^(3|1)\.(png|jpe?g|gif|webp)$/i);
            if (numbered) pushCandidate(numbered.download_url);

            const anyImage = list.find(f => hasImageExt(f.name));
            if (anyImage) pushCandidate(anyImage.download_url);
            pushCandidate('placeholder.png');
            return out;
        }


        async function downloadThemeFilesAsZip(themeName, files, progressCallbacks) {
            const zip = new JSZip();
            const fileEntries = Array.isArray(files) ? files : [];
            progressCallbacks?.onStart?.(`Fetching file list for ${themeName}...`);
            const totalFiles = fileEntries.length;
            if (totalFiles === 0) throw new Error('No files found in the theme folder.');

            let downloadedFiles = 0;
            let successfulFiles = 0;

            for (const file of fileEntries) {
                try {
                    const beforePercent = Math.round((downloadedFiles / totalFiles) * 80);
                    progressCallbacks?.onProgress?.(`${file.path} (${downloadedFiles + 1}/${totalFiles})`, beforePercent);
                    const fr = await fetch(file.download_url, {
                        cache: 'no-cache'
                    });
                    if (!fr.ok) {
                        console.warn(`Failed to fetch file ${file.path}: ${fr.status}`);
                        downloadedFiles++;
                        progressCallbacks?.onProgress?.(`Skipped ${file.path}`, Math.round((downloadedFiles / totalFiles) * 80));
                        continue;
                    }
                    const blob = await fr.blob();
                    zip.file(file.path, blob);
                    successfulFiles++;
                    downloadedFiles++;
                    progressCallbacks?.onProgress?.(`Downloading ${file.path} (${downloadedFiles}/${totalFiles})`, Math.round((downloadedFiles / totalFiles) * 80));
                } catch (e) {
                    console.warn(`Error downloading file ${file.path}:`, e);
                    downloadedFiles++;
                    progressCallbacks?.onProgress?.(`Error ${file.path}`, Math.round((downloadedFiles / totalFiles) * 80));
                }
            }

            if (successfulFiles === 0) {
                throw new Error('No theme files could be downloaded. Please verify file paths in config.json.');
            }

            progressCallbacks?.onProgress?.('Generating ZIP...', 80);

            const content = await zip.generateAsync({
                type: 'blob'
            }, metadata => {
                const mapped = 80 + Math.round((metadata.percent || 0) * 0.2);
                progressCallbacks?.onProgress?.(`Zipping: ${Math.round(metadata.percent || 0)}%`, mapped);
            });

            return content;
        }

        function createProgressUI(parent, oldButton, themeName) {
            const progressWrap = document.createElement('div');
            progressWrap.className = 'theme-progress';
            progressWrap.setAttribute('role', 'status');
            progressWrap.setAttribute('aria-live', 'polite');

            const row = document.createElement('div');
            row.className = 'progress-row';

            const barOuter = document.createElement('div');
            barOuter.className = 'progress-bar';
            const barInner = document.createElement('div');
            barInner.className = 'progress-bar-inner';
            barOuter.appendChild(barInner);

            const percent = document.createElement('div');
            percent.className = 'progress-percent';
            percent.textContent = '0%';

            row.appendChild(barOuter);
            row.appendChild(percent);

            const text = document.createElement('div');
            text.className = 'progress-text';
            text.textContent = `Preparing ${themeName}...`;

            progressWrap.appendChild(row);
            progressWrap.appendChild(text);

            parent.replaceChild(progressWrap, oldButton);

            return {
                root: progressWrap,
                setProgress(pct, msg) {
                    const clamped = Math.max(0, Math.min(100, Math.round(pct)));
                    barInner.style.width = clamped + '%';
                    percent.textContent = clamped + '%';
                    if (msg) text.textContent = msg;
                },
                removeAndRestoreButton(originalButton) {
                    try {
                        if (!originalButton.parentElement) parent.appendChild(originalButton);
                        parent.replaceChild(originalButton, progressWrap);
                        const origText = originalButton.innerHTML;
                        originalButton.innerHTML = 'Downloaded âœ“';
                        originalButton.disabled = false;
                        setTimeout(() => {
                            originalButton.innerHTML = origText;
                        }, 2500);
                    } catch (e) {
                        console.warn('restore button failed', e);
                    }
                },
                abortAndRestore(originalButton) {
                    try {
                        if (!originalButton.parentElement) parent.appendChild(originalButton);
                        parent.replaceChild(originalButton, progressWrap);
                        originalButton.disabled = false;
                    } catch (e) {
                        console.warn('abort restore failed', e);
                    }
                }
            };
        }

        async function downloadTheme(theme, buttonNode, downloadableFiles, maskVariantState) {
            const parent = buttonNode.parentElement || buttonNode.parentNode;
            if (!parent) return;
            buttonNode.disabled = true;

            const progressUI = createProgressUI(
                parent,
                buttonNode,
                ensureDarkModeDisplayName(theme.name, theme.folder) || 'theme'
            );

            try {
                if (!theme.folder) {
                    alert('No downloadable folder info for this theme.');
                    progressUI.abortAndRestore(buttonNode);
                    return;
                }

                const maskChoices = maskVariantChoicesFromFiles(
                    theme.folder,
                    downloadableFiles,
                    maskVariantState && maskVariantState.baseMaskPath
                );
                const selectedMask = await promptMaskVariant(
                    theme.name,
                    maskChoices,
                    theme.folder,
                    maskVariantState && maskVariantState.selectEl ? maskVariantState.selectEl.value : ''
                );
                if (selectedMask === null) {
                    progressUI.abortAndRestore(buttonNode);
                    return;
                }
                if (maskVariantState && maskVariantState.selectEl && selectedMask && selectedMask.sourcePath) {
                    maskVariantState.selectEl.value = selectedMask.sourcePath;
                    if (typeof maskVariantState.selectEl.onchange === 'function') {
                        maskVariantState.selectEl.onchange();
                    }
                }
                const entriesForDownload = applyMaskVariantToEntries(
                    theme.folder,
                    downloadableFiles,
                    selectedMask && selectedMask.sourcePath,
                    maskVariantState && maskVariantState.baseMaskPath
                );

                const callbacks = {
                    onStart: (msg) => {
                        progressUI.setProgress(0, msg);
                    },
                    onProgress: (msg, percent) => {
                        progressUI.setProgress(percent || 0, msg || '');
                    }
                };

                const zipBlob = await downloadThemeFilesAsZip(
                    ensureDarkModeDisplayName(theme.name, theme.folder) || theme.name,
                    entriesForDownload,
                    callbacks
                );

                const a = document.createElement('a');
                a.href = URL.createObjectURL(zipBlob);
                const zipLabel = ensureDarkModeDisplayName(theme.name, theme.folder) || 'theme';
                const safe = zipLabel.replace(/[^\w\d-_ ]/g, '_') || 'theme';
                a.download = `${safe}.zip`;
                document.body.appendChild(a);
                a.click();
                a.remove();

                progressUI.removeAndRestoreButton(buttonNode);
            } catch (err) {
                console.error('Download failed', err);
                alert(`Failed to download theme "${ensureDarkModeDisplayName(theme.name, theme.folder)}": ${err.message || err}`);
                progressUI.abortAndRestore(buttonNode);
            }
        }

                    artworkMessageWrap.style.display = 'block';
                } else {
                    artworkListEl.innerHTML = '';
                    artworkMessageWrap.style.display = 'none';
                }
            }

            if (!themeMeta || !themeMeta.author) {
                authorEl.style.display = 'none'
            } else {
                const a = document.createElement('span')
                if (themeMeta.author === 'Innioasis') {
                    a.innerHTML = `by <a href="https://innioasis.com" target="_blank" rel="noopener">Innioasis</a>`
                } else if (themeMeta.author === 'u/ope-nz | Normal-Curve-1642') {
                    a.innerHTML = `by <a href="https://reddit.com/u/Normal-Curve-1642" target="_blank" rel="noopener">Normal-Curve-1642</a>`
                } else if (themeMeta.author === 'sipped') {
                    a.innerHTML = `by <a href="https://sipped.org" target="_blank" rel="noopener">sipped</a>`
                } else {
                    const preferredUrl = getPreferredAuthorUrl(themeMeta.author, themeMeta.authorUrl)
                    a.innerHTML = preferredUrl ?
                        `by <a href="${preferredUrl}" target="_blank" rel="noopener">${themeMeta.author}</a>` :
                        `by ${themeMeta.author}`
                }
                authorEl.innerHTML = ''
                authorEl.appendChild(a)
                if (themeMeta.authorUrl) {
                    const ic = document.createElement('a')
                    ic.href = themeMeta.authorUrl
                    ic.target = '_blank'
                    ic.rel = 'noopener'
                    ic.style.marginLeft = '8px'
                    ic.innerHTML = `<i class="fa-brands fa-reddit" title="author link"></i>`
                    authorEl.appendChild(ic)
                }
            }

            const screenshotCandidates = buildScreenshotCandidates(themeMeta?.screenshot, displayFiles)
            let screenshotIdx = 0
            screenshotEl.src = screenshotCandidates[screenshotIdx] || 'placeholder.png'
            screenshotEl.onerror = () => {
                screenshotIdx += 1
                if (screenshotIdx < screenshotCandidates.length) {
                    screenshotEl.src = screenshotCandidates[screenshotIdx];
                    return;
                }
                screenshotEl.onerror = null;
                screenshotEl.src = FALLBACK_PLACEHOLDER_URL;
            }

            const folderClean = (folder || '').replace(/^\.\/+/, '')
            const encodedFolderPath = folderClean.split('/').map(seg => encodeURIComponent(seg)).join('/');
            rawFolderLink.href = `https://github.com/y1-community/InnioasisY1Themes/tree/main/${encodedFolderPath}`

            const siteBase = 'https://themes.innioasis.app';
            const maintRow = document.getElementById('theme-maintainer-row');
            const editA = document.getElementById('theme-action-edit');
            const remA = document.getElementById('theme-action-remove');
            const reportA = document.getElementById('theme-action-report');
            if (maintRow && editA && remA && folderClean) {
                const enc = encodeURIComponent(folderClean);
                editA.href = `${siteBase}/upload.html?mode=edit&folder=${enc}`;
                remA.href = `${siteBase}/upload.html?mode=remove&folder=${enc}`;
                maintRow.style.display = 'flex';
            }
            if (reportA && folderClean) {
                const enc = encodeURIComponent(folderClean);
                const tq = encodeURIComponent(displayName || '');
                const aq = encodeURIComponent(seoAuthor || '');
                const ref = encodeURIComponent(location.href.split('#')[0]);
                reportA.href = `${siteBase}/report-theme.html?folder=${enc}&title=${tq}&author=${aq}&ref=${ref}`;
            }

            const themeObj = {
                name: displayName,
                folder: folder,
                externalDownloadUrl: String(themeMeta && themeMeta.externalDownloadUrl || '').trim(),
                authorCTA: String(themeMeta && themeMeta.authorCTA || '').trim()
            }

            const externalDownloadUrl = String(themeObj.externalDownloadUrl || '').trim();
            const hasExternalDownload = /^https?:\/\//i.test(externalDownloadUrl);
            if (hasExternalDownload) {
                downloadBtn.innerHTML = `<i class="fa-solid fa-arrow-up-right-from-square" style="margin-right: 4px;"></i> ${safeText(themeObj.authorCTA || 'Open download page')}`;
                downloadBtn.onclick = () => window.open(externalDownloadUrl, '_blank', 'noopener');
                if (maskVariantWrap) maskVariantWrap.style.display = 'none';
                if (directInstallPromo) directInstallPromo.style.display = 'none';
            } else {
                downloadBtn.innerHTML = '<i class="fa-solid fa-download" style="margin-right: 4px;"></i> Download';
                downloadBtn.onclick = () => downloadTheme(themeObj, downloadBtn, effectiveFiles, maskVariantState);
                if (supportDirectInstall && directInstallPromo) {
                    directInstallPromo.style.display = 'block';
                }
            }

            if (!displayFiles.length) {
                assetsList.innerHTML = `<div style="color:var(--text-secondary)">No downloadable files were resolved from this theme's config.json.</div>`
            } else {
                displayFiles.sort((a, b) => String(a.path || '').localeCompare(String(b.path || '')))
                for (const f of displayFiles) {
                    const row = document.createElement('div')
                    row.style.display = 'flex'
                    row.style.alignItems = 'center'
                    row.style.gap = '10px'
                    row.style.background = 'transparent'
                    row.style.padding = '6px'
                    row.style.borderRadius = '6px'

                    const isImage = /\.(png|jpe?g|gif|webp|svg)$/i.test(f.name)
                    if (isImage) {
                        const img = document.createElement('img')
                        img.src = f.download_url
                        img.alt = f.name
                        img.style.width = '72px'
                        img.style.height = '48px'
                        img.style.objectFit = 'contain'
                        img.style.borderRadius = '6px'
                        img.onerror = () => {
                            img.onerror = null
                            img.src = FALLBACK_PLACEHOLDER_URL
                        }
                        row.appendChild(img)
                    } else {
                        const ic = document.createElement('div')
                        ic.style.width = '72px'
                        ic.style.height = '48px'
                        ic.style.display = 'flex'
                        ic.style.alignItems = 'center'
                        ic.style.justifyContent = 'center'
                        ic.innerHTML = `<i class="fa-solid fa-file" style="font-size:20px;color:var(--text-secondary)"></i>`
                        row.appendChild(ic)
                    }

                    const nameWrap = document.createElement('div')
                    nameWrap.style.display = 'flex'
                    nameWrap.style.flexDirection = 'column'
                    nameWrap.style.flex = '1'

                    const link = document.createElement('a')
                    link.href = f.download_url
                    link.textContent = f.path
                    link.target = '_blank'
                    link.rel = 'noopener'
                    link.style.color = 'lightblue'
                    link.style.textDecoration = 'none'
                    link.style.fontWeight = '600'
                    link.style.fontSize = '0.95rem'

                    const meta = document.createElement('div')

                    function formatSize(size) {
                        if (size >= 1_000_000) return (size / 1_000_000).toFixed(2) + ' MB';
                        if (size >= 1_000) return (size / 1_000).toFixed(2) + ' KB';
                        return size + ' bytes';
                    }
                    meta.textContent = formatSize(f.size ?? 0);
                    meta.style.color = 'var(--text-secondary)'
                    meta.style.fontSize = '0.85rem'
                    meta.style.marginTop = '4px'

                    nameWrap.appendChild(link)
                    nameWrap.appendChild(meta)
                    row.appendChild(nameWrap)
                    assetsList.appendChild(row)
                }
            }
            if (maskVariantPreview && (!maskVariantWrap || maskVariantWrap.style.display === 'none')) {
                maskVariantPreview.style.display = 'none';
            }
        })()
    </script>
</body>

</html>
